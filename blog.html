    body: `
      <p>My compulsions stem from an innate need to feel perfect. To get things <em>just right.</em> That part of OCD that is impossible to satisfy: the chasing of certainty, the perfectionism that has no finish line. It followed me into my software engineering career, and at some point, it felt like a switch was flipped.</p>
      <h2>Before</h2>
      <p>I used to write code and check it once. I felt confident in what I shipped. I could speak to what I'd written with ease. And then one day, that felt impossible.</p>
      <h2>The spiral</h2>
      <p>My fingers would hover over the keys and I'd question everything. What I was typing, why I was typing it, whether the letters made sense, whether my understanding was actually correct. I convinced myself I was illiterate. Uneducated. Useless. When I'd finally write something, it felt wrong, and so I'd check outputs for hours. Burn the midnight oil by triple-checking everything was as intended, if I could even convince myself of what that was.</p>
      <p>A senior developer is supposed to do these things with ease. A person is not supposed to second guess everything that was once so automatic. And I was failing what felt like the most basic of tasks, as both a developer and a human being.</p>
      <h2>What I learned</h2>
      <p>This is not normal. Suffering like this is not normal, and I shouldn't have had to white-knuckle through that uncertainty, ruminating and wracking my brain for evidence of certainty for hours, while convincing myself everything was fine.</p>
      <p>OCD does a great job at making you feel like something is so fundamentally wrong with you that "normal" isn't viable, that things will always be this way. They don't have to be. Help exists for this. Working with a therapist and engaging in ERP, allowing these thoughts, no matter how debilitating, to pass through rather than compulsively neutralizing them, made the difference for me.</p>
      <h2>Where I'm at now</h2>
      <p>I'm not 100%. There are still days I fall into that spiral, into the trap my brain produces. But it's easier to tolerate. And it's easier to forgive myself. That's not nothing. That's everything.</p>
      <p>If any of this sounds familiar: you're not broken, you're not useless, and you don't have to figure this out alone.</p>
    `

    title: 'Reachy Mini - Day 0',
    preview: 'Starting from zero on robotics. No background, no robot yet, just a simulation and a lot of questions.',
    body: `
      <p>One of the coolest things about <a href="https://huggingface.co/reachy-mini" target="_blank" rel="noopener" style="color:var(--accent); text-decoration:underline;">Reachy Mini</a> (aside from the fact that it's an adorable lil open-source robot that can talk, move, and even dance) is the fact that you can actually play with it without having a physical Reachy in front of you.</p>

      <p>While I anxiously await for my robot \u2013 which I've lovingly named Babymax for the obvious resemblance to the Big Hero 6 character, more on that later \u2013 to make its way to Arlington, Virginia, I've been doing some research and found that I can run a simulation and interact with the robot in there, playing around with Python.</p>

      <p>Pretty neat, huh?</p>

      <p>Currently, the code to make the robot do ANYTHING is high level. Easier for me, since the code hides all of the complexity like inverse kinematics (what?!), I can focus on building intelligence. I can make Babymax dance without having to manually rotate every single motor one by one. But, if I ever need to get under the hood, the system is flexible enough to let me talk to the motors and sensors directly through the daemon (The Vampire Diaries, anyone?) Let's break some things down, as someone with zero robotics background.</p>

      <ul style="list-style:none; display:flex; flex-direction:column; gap:0.6rem; margin: 1rem 0 1rem 0.5rem;">
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span><strong style="color:var(--ink);">The Daemon</strong> \u2013 the "middleman" or translator. A background service that runs continuously. It takes to the physical hardware or, in my case, the simulation on one side and exposes an API (talking to the Python script) on another.</li>
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span><strong style="color:var(--ink);">MuJoCo</strong> \u2013 the physics engine. It simulates the real world inside of my computer, calculating gravity, friction, collision, and momentum. Pretty important stuff. When my high-level code sends a command to move, MuJoCo calculates exactly what that move would look like in a 3D space.</li>
      </ul>

      <p>When I run a command like <code style="font-size:0.875rem; background:rgba(26,25,23,0.06); padding:0.15rem 0.4rem; border-radius:4px;">reachy-mini-daemon --sim</code> (more on this later \u2014 this starts the daemon in simulation mode, telling it to connect to the virtual robot instead of a physical one), I'm basically telling the computer to ignore the real robot and pretend its connected to the virtual robot inside the physics engine. The daemon keeps the simulation running, it waits for my commands, and we can get the virtual robot to interact!</p>

      <h2>What does this mean for the real Reachy?</h2>

      <p>When I get the real robot, because we can run with the daemon, my code doesn't change at all.</p>
      <p>In the simulation, I run the daemon with <code style="font-size:0.875rem; background:rgba(26,25,23,0.06); padding:0.15rem 0.4rem; border-radius:4px;">--sim</code> (that's the part that says "use the virtual robot"), tell it to "move head left" and the physics engine gets updated via the Daemon.</p>
      <p>Then when I get the real robot, I plug it into my computer's USB port, I run the daemon without the <code style="font-size:0.875rem; background:rgba(26,25,23,0.06); padding:0.15rem 0.4rem; border-radius:4px;">--sim</code> flag, and when my code says "move head left", the daemon sends actual electrical signals to the physical motors in the robot's neck.</p>

      <p>TL;DR: because the SDK talks to the daemon, not the hardware directly, I can write all of my code in the simulation and then just plug in Babymax when the time comes without rewriting a single line of code.</p>

      <p>I created a document to set up the simulation here: <a href="https://github.com/dianadelg/roboticsReachyMini/blob/main/Reachy%20Mini%20Install%20Instructions%20-%20Windows.pdf" target="_blank" rel="noopener" style="color:var(--accent); text-decoration:underline;">Reachy Mini Install Instructions (Windows)</a>.</p>
      <p>While I was trying to set this up, I ran into a few things, and I figured it's important to share this process with anyone else who's new.</p>

      <ul style="list-style:none; display:flex; flex-direction:column; gap:0.6rem; margin: 1rem 0 1rem 0.5rem;">
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span>I had an old version of python. Had to update to something between 3.10 and 3.13 (the official docs recommend 3.12 specifically).</li>
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span>I needed to install the WSL (Windows Subsystem for Linux) \u2013 which provides a linux environment where the robot's software expects to live, preventing crashes caused by missing unix files. Initially I tried to install everything on my local and\u2026yeah. I needed a dedicated virtual environment, so dependencies didn't conflict. I don't really know what was going on but it was a lot and scary and super intimidating for someone new to this.</li>
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span>Make sure I installed both the daemon AND the sdk. For simulation specifically, you'll want <code style="font-size:0.875rem; background:rgba(26,25,23,0.06); padding:0.15rem 0.4rem; border-radius:4px;">pip install "reachy-mini[mujoco]"</code> \u2014 <code style="font-size:0.875rem; background:rgba(26,25,23,0.06); padding:0.15rem 0.4rem; border-radius:4px;">pip install</code> is how you tell Python to download and install a package, and the <code style="font-size:0.875rem; background:rgba(26,25,23,0.06); padding:0.15rem 0.4rem; border-radius:4px;">[mujoco]</code> part is an "extra" that also pulls in the physics engine bindings you need for the simulation to run.</li>
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span>Before I tried to execute any python commands, I had to make sure the simulation was running <code style="font-size:0.875rem; background:rgba(26,25,23,0.06); padding:0.15rem 0.4rem; border-radius:4px;">reachy-mini-daemon --sim</code>. This launches the daemon in simulation mode and opens the 3D viewer window \u2014 without this running first, your Python script has nothing to talk to. Seems obvious now but I wasn't sure how things connected at first and this was clearly a missing piece. I think I started with the method of "hey let's get something to run first." Would've saved me some time!</li>
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span>The repository for Reachy states that it's supported and tested on Linux and macOS. Windows, not so much. We need that MuJoCo engine to run our code, but windows makes this funky (GPU drivers, display context\u2026things get wonky.) At one point, I was trying to bypass this using a docker image and running the simulator in Docker, but it is not public. Enter WSL (Linux inside windows). Required me to download Ubuntu and run the simulator that way, install Reachy and the simulator dependencies in there. Also make sure your packages are updated \u2014 in Ubuntu you can do that with <code style="font-size:0.875rem; background:rgba(26,25,23,0.06); padding:0.15rem 0.4rem; border-radius:4px;">sudo apt update && sudo apt upgrade</code>, which just checks for and installs any pending system updates.</li>
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span>The dependencies were also funky. I ended up having to remove and reinstall things a few times (thanks to GPT for helping me troubleshoot.)</li>
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span>Make sure you're installing the correct Reachy simulator. There are versions out there.</li>
        <li style="padding-left:1rem; position:relative; font-size:0.975rem; color:var(--ink-muted); line-height:1.75;"><span style="position:absolute;left:0;color:var(--ink-faint);">\u2014</span>Make sure your Reachy environment is configured correctly. We need an isolated environment to install the Reachy SDK \u2014 this is basically a contained little bubble for Python so the packages you install for Reachy don't collide with packages you have installed for other projects.</li>
      </ul>

      <p>Well that was a journey, but we got there. My first crack and this whole robotics thing, and it was interesting (and frustrating, but no one said this would be easy). I'm eager and excited to continue while I patiently wait for Babymax to make his way into the world \U0001f916</p>
    `
  }
,

const TAG_CLASS = { tech: 'tag-tech', mental: 'tag-mental', career: 'tag-career', education: 'tag-education' };
const PILL_ACTIVE = { all: 'active-all', tech: 'active-tech', mental: 'active-mental', career: 'active-career', education: 'active-education' };

let currentFilter = 'all';
let currentSearch = '';
let openPostId = null;

function getFilteredPosts() {
  return POSTS.filter(p => {
    const matchesFilter = currentFilter === 'all' || p.tag === currentFilter;
    const q = currentSearch.toLowerCase();
    const matchesSearch = !q || p.title.toLowerCase().includes(q) || p.preview.toLowerCase().includes(q) || p.tagLabel.toLowerCase().includes(q);
    return matchesFilter && matchesSearch;
  });
}

function renderPosts() {
  const layout = document.getElementById('posts-layout');
  const posts = getFilteredPosts();
  const countEl = document.getElementById('post-count');

  countEl.textContent = posts.length === 1 ? '1 post' : `${posts.length} posts`;

  if (posts.length === 0) {
    layout.innerHTML = `<div class="empty-state"><span class="empty-icon">\u270d\ufe0f</span><p>No posts match that search.<br>Try a different term or filter.</p></div>`;
    return;
  }

  layout.innerHTML = posts.map(p => {
    const isOpen = openPostId === p.id;
    return `
      <article class="post-card${isOpen ? ' open' : ''}" id="card-${p.id}" onclick="togglePost('${p.id}')">
        <div class="post-card-header">
          <div class="post-card-header-row">
            <span class="blog-tag ${TAG_CLASS[p.tag]}">${p.tagLabel}</span>
            <div class="expand-icon" aria-label="${isOpen ? 'Collapse' : 'Expand'} post">
              <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
          </div>
          <h2>${p.title}</h2>
          <p class="post-card-preview">${p.preview}</p>
          <div class="post-card-meta">${p.date} \u00b7 ${p.readTime}</div>
        </div>
        <div class="post-body-wrap">
          <div class="post-body">${p.body}${p.video ? `<div class="post-video"><iframe src="${p.video}" allowfullscreen loading="lazy"></iframe></div><p class="post-video-caption">${p.videoCaption || ''}</p>` : ''}</div>
        </div>
      </article>
    `;
  }).join('');
}

function togglePost(id) {
  if (openPostId === id) {
    openPostId = null;
  } else {
    openPostId = id;
  }
  renderPosts();
  if (openPostId) {
    setTimeout(() => {
      const card = document.getElementById('card-' + openPostId);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 60);
  }
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.pill').forEach(p => {
    const f = p.dataset.filter;
    p.className = 'pill';
    if (f === filter) p.classList.add(PILL_ACTIVE[f]);
  });
  renderPosts();
}

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => setFilter(btn.dataset.filter));
});

document.getElementById('search-input').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderPosts();
});

function handleDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const postParam = params.get('post');
  if (postParam && POSTS.find(p => p.id === postParam)) {
    openPostId = postParam;
  }
}

handleDeepLink();
renderPosts();
</script>
</body>
</html>
